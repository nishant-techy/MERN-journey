  <body>
    <script>
      // 1st question
      let arr = [11, 21, 13, 4, 6, 5, 12, 33, 15];
      let sum = 0;
      arr.forEach((el) => {
        let square = el * el;
        console.log(`The square of the number ${el} is ${square}`);
        sum += square;
      });
      let avg = sum / arr.length;
      console.log(`The average of the number is ${avg}.`);

      //   2nd question
      let newArr = [];
      arr.map((el) => {
        newArr.push((el += 5));
      });
      console.log("Incremented by 5: ", newArr);

      //   3rd question
      let originalArr = ["a", "b", "e", "t"];
      let newUpperArr = [];
      originalArr.forEach((el) => {
        newUpperArr.push(el.toUpperCase());
      });
      console.log(`New array: ${newUpperArr}`);

      //   4th question
      let newAr = [];
      function doubleAndReturnArgs(arr, ...arg) {
        let result = arg.map((el) => {
          return el * 2;
        });
        return [...arr, ...result];
      }

      let result = doubleAndReturnArgs([11, 21, 13, 4], 2, 55, 3, 21, 33);
      console.log(result);

      // 5th question
      function mergeObjects(obj1, obj2) {
        return { ...obj1, ...obj2 };
      }
      console.log(mergeObjects({ a: 1 }, { b: 2 }));

      console.log("--------------- AGAIN -----------------");

      // let's do the same again

      // arr.map((el) => {el * el}); //square
      let doubleA = arr.map((el) => {
        return el * el;
      }); //let's store this value somewhere to use it later
      // let's add all of those values which is in that doubleA array we can use "reduce" method
      let sumA = doubleA.reduce((acc, current) => {
        return acc + current;
      }, 0); // the 0 in the end is the starting point of accumulator value,
      // the real concept looks like -
      // --------------------- reduce() syntax -----------------------
      //       array.reduce((acc, curr) => {
      //   // logic

      console.log(sumA);
      let avgA = sumA / arr.length;
      console.log("The average of those numbers are: ", avgA);

      // 2nd question again
      console.log("Old array: ", arr);
      console.log(arr.map((el) => el + 5));

      // 3rd question again

        return el.toUpperCase();
      });
      console.log(newArrA);

      // 4th question again
      let doubleAndReturnArgsA = (arrr, ...argg) => {
        let doubleAgain = argg.map((element) => element * 2);
        let concat = [...arrr, ...doubleAgain];
        return concat;
      };

      console.log(
        doubleAndReturnArgsA([3, 5, 3, 5, 33], 4, 2, 5, 54, 64, 22, 66, 1),
      );

      console.log(mergeObjectsA({ a: 1 }, { b: 2 }));
