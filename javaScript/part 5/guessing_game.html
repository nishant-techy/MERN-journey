<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice: JS (part - 5)</title>
  </head>
  <body>
    <script>
      const student = {
        name: "shardha",
        age: 23,
        marks: 94.4,
        city: "Delhi",
      };

      //   Update and add value
      student.city = "Mumbai";

      student.gender = "Female";

      student["marks"] = "A";
      console.log(student);

      //   question - Generate the random number between 1 and 100
      let gen = Math.floor(Math.random() * 100) + 1;
      console.log("Random generated number is: ", gen);

      //   question - Generate the random number between 1 and 5
      let BEN = Math.floor(Math.random() * 5) + 1;
      console.log("Random generated number is: ", BEN);

      // Guessing game
      console.log(
        " --------------- Entering in the Guessing game --------------- ",
      );
      let max = Number(
        prompt(
          "Enter the maximum range number within system can guess the number: ",
        ),
      );
      let rand = Math.floor(Math.random() * max) + 1;
      let userGuess = prompt(
        "Enter the number what system would guess according to you: ",
      );

      while (true) {
        if (userGuess === "quit" || userGuess == null) {
          console.log("you quit the game");
          break;
        }

        userGuess = Number(userGuess); // because prompt will give you string
        if (rand === userGuess) {
          alert("Congratulations! Numbers are matched");
          console.log("Finally, game has ended!");
          break;
        } else {
          if (userGuess < rand) {
            console.log("Too low");
          } else {
            console.log("Too high");
          }
          userGuess = prompt("Not matched! Try again: ");
          console.log(`You enter the number ${userGuess}`);
        }
      }
    </script>
  </body>
</html>
