<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Getting started (3 ways to style the html sheet)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h1 {
            color: purple;
            background-color: pink;
        }
        button {
            color: yellow;
            background-color: red;
        }
    </style>
</head>
<body>
    <!-- first method -->
     <h1 style="color: red; background-color: aliceblue;">First heading with inline styling</h1>
     <button style="color: red; background-color: black;">First button</button>
<br><br>
     <!-- second method -->
      <h1>Second heading with styling tag in head</h1>
      <button>Second button</button>
<br><br>
    <!-- third method -->
     <div>
         <h2>Third heading with styling in external stylesheet (style.css)</h2>
         <button>Third button</button>
    </div>
</body>
</html>
