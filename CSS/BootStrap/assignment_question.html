<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Practice Question</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assignment_question.css" />
    </style>
  </head>
  <body>
    <!-- the heading and content in center -->
    <div class="text-center">
      <h1>Pricing</h1>
      <p>Please checkout our most effective payment models</p>
    </div>
    <!-- container of equal distribution -->
    <div class="container">
      <div class="row text-center d-flex justify-content-around">
        <!-- first column of row -->
        <div class="col-lg-3 border col-md-5 mb-4">
          <div class="col-sm bg-light p-2 border-bottom" style="font-size: 20px">Free</div>
          <div class="p-3">
              <h1>0$/month</h1>
              <p>
                  10 users included
                  <br />
                  2 GB of storage
                  <br />
                  Email Support
                </p>
                <button class="btn btn-outline-primary">Sign up for free</button>
            </div>
        </div>
        <!-- Second column of row -->
        <div class="col-lg-3 border col-md-5 mb-4">
          <div class="col-sm bg-light p-2 border-bottom" style="font-size: 20px">Pro</div>
          <div class="p-3">
          <h1>15$/month</h1>
          <p>
            20 users included
            <br />
            10 GB of storage
            <br />
            Priority email Support
          </p>
          <button class="btn btn-primary">Get Started</button>
        </div>
        </div>
        <!-- Third column of row -->
        <div class="col-lg-3 border col-md-10">
          <div class="col-sm bg-light p-2 border-bottom" style="font-size: 20px">Enterprise</div>
          <div class="p-3">
          <h1>29$/month</h1>
          <p>
            30 users included
            <br />
            15 GB of storage
            <br />
            Phone & Email Support
          </p>
          <button class="btn btn-primary">Contact us</button>
        </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
