<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practicle Question 7 | Advance Table</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
        table {
            width: 100%;
        }
        table, tr, th, td {
            border: 1px solid white;
            text-align: center;
        }
        td {
            padding: 10px;
        }
        caption {
            font-size: 25px;
        }
    </style>
</head>
<body>
    <table>
        <caption>A test table with merged cells</caption>
        <tr>
            <th rowspan="2"></th>
            <th colspan="2">Average</th>
            <th rowspan="2">Red Eyes</th>
        </tr>
        <tr>
            <th>Height</th>
            <th>Weight</th>
        </tr>

        <tr>
            <td>Males</td>
            <td>1.9</td>
            <td>0.0003</td>
            <td>40%</td>
        </tr>

        <tr>
            <td>Females</td>
            <td>1.7</td>
            <td>0.0002</td>
            <td>37%</td>
        </tr>
    </table>
</body>
</html>
