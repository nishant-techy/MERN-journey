<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript & Superscript tags in HTML</title>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 30px;
        }
    </style>
</head>
<body>
    <h3>Subscript and Superscript tags in HTML :-</h3>
    <div>
        a<sup>2</sup> = b<sup>2</sup> + c<sup>2</sup>
        <br><br>
        H<sub>2</sub>O
        <br><br>
        C<sub>6</sub>H<sub>12</sub>O<sub>6</sub>
    </div>    
</body>
</html>
