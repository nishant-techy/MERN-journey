<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Assignment</title>
    <style>
      * {
        text-align: center;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      #mainTopic {
        background-color: blue;
      }
      .white_color {
        color: white;
        background-color: cornflowerblue;
      }
      div button {
        background-color: purple;
        color: azure;
      }
      div button:hover {
        background-color: yellow;
        color: blue;
      }
      p:nth-of-type(2n-1) {
        color: yellow;
      }
      h1::first-letter {
        color: red;
      }
      input[type="checkbox"]:checked + label {
        color: darkgreen;
      }
    </style>
  </head>
  <body>
    <h1 id="mainTopic">CSS Practice</h1>
    <h3>Let's learn about selectors.</h3>

    <!-- Paragraph 1 -->
    <p class="white_color">There are multiple selectors in CSS.</p>

    <!-- Paragraph 2 -->
    <p class="white_color">
      Some of them include class selector, id selector, etc.
    </p>

    <!-- Paragraph 3 -->
    <p class="white_color">And we can also combine these too.</p>

    <div>
      <h5>Did you like the practice set?</h5>

      <input type="checkbox" id="yes" />
      <label for="yes">Yes</label>

      <br /><br />

      <button>Learn next!</button>
    </div>
  </body>
</html>
