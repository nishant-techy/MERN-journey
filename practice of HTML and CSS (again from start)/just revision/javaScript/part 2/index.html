<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript (Part - 2) Practice Question</title>
  </head>
  <body>
    <!-- javaScript (part - 2) Practice Question -->
    <script>
      // Traffic light
      let traffic_light = "yellow";
      if (traffic_light == "red") {
        console.log("Stop now!");
      } else if (traffic_light == "yellow") {
        console.log("Slow down");
      } else if (traffic_light == "green") {
        console.log("Let's Go!!");
      } else {
        console.log("Traffic light is broken!");
      }
      //   traffic light by switch
      let color = "red";
      switch (color) {
        case "red":
          console.log("Stop!");
          break;
        case "yellow":
          console.log("Slow down");
          break;
        case "green":
          console.log("Let's Go!");
          break;
        default:
          console.log("Traffic light is broken!");
      }

      //   Practice Question - 2
      // Popcorn question
      let size = "xl";
      if (size === "xl") {
        console.log("size is xtra large, Price is rs.250 for that");
      } else if (size === "l") {
        console.log("size is large, Price is rs.200 for that");
      } else if (size === "m") {
        console.log("size is medium, Price is rs.100 for that");
      } else if (size === "s") {
        console.log("size is small, Price is rs.50 for that");
      } else {
        console.log("Popcorn counter is closed, Please find something online!");
      }

      //   Nested if-else Question
      let marks = 81;
      if (marks >= 33) {
        if (marks >= 80) {
          console.log("Grade: O");
        } else if (marks < 80) {
          console.log("Grade: A");
        } else {
          console.log("Better luck, next time!");
        }
      }

      //   Practice Question
      let str = "This is just an example";
      if (str[0] === "a" && str.length > 3) {
        console.log(`${str} is a good string`);
      } else {
        console.log(
          "Doesn't fulfill all of the criteria to be the good string",
        );
      }

      //   Practice Question
      let num = 12;
      if (num % 3 === 0 && (num + 1 == 15 || num - 1 == 11)) {
        console.log("safe");
      } else {
        console.log("unsafe");
      }

      //   practice Question
      let day = 3;
      switch (day) {
        case 1:
          console.log("Today is Monday");
          break;
        case 2:
          console.log("Today is Tuesday");
          break;
        case 3:
          console.log("Today is Wednesday");
          break;
        case 4:
          console.log("Today is Thursday");
          break;
        case 5:
          console.log("Today is Friday");
          break;
        case 6:
          console.log("Today is Saturday");
          break;
        case 7:
          console.log("Today is Sunday");
          break;
        default:
          console.log("day value is wrong");
      }

      // JS (part-2) practice question sheet
      // 1st question:
      let num1 = 300;
      if (num1 % 10 == 0) {
        console.log("1). Good value");
      } else {
        console.log("2). Bad value");
      }

      // 2nd question:
      // let age = window.prompt("Enter your age: ");
      // let userName = window.prompt("Enter your name: ");
      let age = 3;
      let userName = "Remove me"; // uncomment the above ones whenever you have to see the real solution
      // substituting the value
      let replace = age;
      age = userName;
      userName = replace;
      console.log(`${userName} is ${age} years old`);

      // 3rd question
      let quarter = 2;
      switch (quarter) {
        case 1:
          console.log("January, February, March");
          break;
        case 2:
          console.log("April, May, June");
          break;
        case 3:
          console.log("July, August, September");
          break;
        case 4:
          console.log("October, November, December");
          break;
        default:
          console.log("Not a valid quarter");
      }

      // 4th question
      let strr = "Any random string";
      if ((strr[0] === "a" || strr[0] === "A") && strr.length > 5) {
        console.log("That's a Golden string");
      } else {
        console.log("It is not a Golden string");
      }

      // 5th question
      let a = 44;
      let b = 90;
      let c = 2;
      if (a > b && a > c) {
        console.log(`${a} is the biggest from ${b} and ${c}`);
      } else if (b > c) {
        console.log(`${b} is the biggest number from ${a} and ${c}`);
      } else {
        console.log(`${c} is the biggest number from ${a} and ${b}`);
      }

      // 6th question
      let first = 353436;
      let second = 336;
      let aa = first % 10;
      if (first % 10 === second % 10) {
        console.log(`${aa} is in the last of both of the digits`);
      } else {
        console.log(`Last digit doesn't matched, try again`);
      }
    </script>
  </body>
</html>
