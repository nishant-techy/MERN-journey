<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container-fluid text-center mt-5">
      <!-- my pricing box -->
      <h1>Pricing</h1>
      <p>Please checkout our most effective payment models</p>
      <div class="row text-center">
        <!-- main outer column who handles the main width of the container -->
        <div class="px-5 col-md-6 col-lg-4 mb-3">
          <div class="border border-secondary px-3 pb-3">
            <span
              class="bg-secondary bg-opacity-25 d-block fs-4 border-secondary border-bottom p-1"
              >Free</span
            >
            <span class="fw-semibold fs-2">$0/mo</span>
            <p>
              10 users included <br />
              2 GB of storage <br />
              Email support
            </p>
            <button type="button" class="btn btn-outline-info">
              Sign up for free
            </button>
          </div>
        </div>

        <!-- main secondary column who handles the middle width of the container -->
        <div class="px-5 col-md-6 col-lg-4 mb-3">
          <div class="border border-secondary px-3 pb-3">
            <span
              class="bg-secondary bg-opacity-25 d-block fs-4 border-secondary border-bottom p-1"
              >Pro</span
            >
            <span class="fw-semibold fs-2">$15/mo</span>
            <p>
              20 users included <br />
              10 GB of storage <br />
              Priority Email support
            </p>
            <button type="button" class="btn btn-info">Get Started</button>
          </div>
        </div>

        <!-- main third column who takes the full width upto 100% -->
        <div class="px-5 col-md-12 col-lg-4 mb-3">
          <div class="border border-secondary px-3 pb-3">
            <span
              class="bg-secondary bg-opacity-25 d-block fs-4 border-secondary border-bottom p-1"
              >Enterprise</span
            >
            <span class="fw-semibold fs-2">$29/mo</span>
            <p>
              30 users included <br />
              15 GB of storage <br />
              Phone & Email support
            </p>
            <button type="button" class="btn btn-info">Contact us</button>
          </div>
        </div>

        <!-- main row class ends here -->
      </div>
      <!-- container fluid ends here -->
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
